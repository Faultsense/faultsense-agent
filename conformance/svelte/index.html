<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faultsense Svelte 5 conformance harness</title>
    <!--
      Load order matters: the conformance collector must register on
      window.Faultsense.collectors.conformance BEFORE the agent resolves
      data-collector-url. Both tags execute synchronously during head parse.
    -->
    <script src="/collector.js"></script>
    <script
      id="fs-agent"
      src="/faultsense-agent.min.js"
      data-release-label="svelte-harness"
      data-api-key="test"
      data-collector-url="conformance"
      data-gc-interval="5000"
    ></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
