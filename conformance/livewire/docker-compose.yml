# Faultsense Livewire conformance harness — local dev + CI runtime.
#
# Boot with:
#   docker compose -f conformance/livewire/docker-compose.yml up -d --wait
#
# Playwright's webServer entry in conformance/playwright.config.ts uses
# the same command so `npm run conformance` starts this container
# automatically.
#
# The faultsense agent bundle and shared collector are bind-mounted
# into public/ so rebuilds of the agent (npm run build:agent in the
# repo root) are picked up without rebuilding the PHP image.

services:
  livewire:
    build:
      context: .
      dockerfile: Dockerfile
    image: faultsense-livewire-harness
    container_name: faultsense-livewire-harness
    ports:
      - "3900:3900"
    volumes:
      # Hot-swap the agent bundle + collector without image rebuilds.
      - ../../dist/faultsense-agent.min.js:/app/public/faultsense-agent.min.js:ro
      - ../shared/collector.js:/app/public/collector.js:ro
      # Mount the app source so Livewire component edits take effect
      # without rebuilding the image. Laravel's `artisan serve` picks
      # up Blade view changes on every request by default.
      - ./app:/app/app
      - ./resources:/app/resources
      - ./routes:/app/routes
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3900/up"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
